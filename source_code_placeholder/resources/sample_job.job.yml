resources:
  jobs:
    sample_job:
      name: sample_job

      email_notifications:
        on_failure:
          - ${var.alerts_email}

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: python_wheel_task
          python_wheel_task:
            package_name: source_code_placeholder
            entry_point: main
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
